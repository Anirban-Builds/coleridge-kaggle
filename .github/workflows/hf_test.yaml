name: Push to Hugging Face
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://Anirban0011:$HF_TOKEN@huggingface.co/spaces/Anirban0011/coleridge-kaggle master:main